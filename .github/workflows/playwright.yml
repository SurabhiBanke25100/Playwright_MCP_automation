name: Playwright Tests - SauceDemo

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:       # manual trigger bhi add kiya

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 - Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'        # fixed version

      # Step 3 - Dependencies install
      - name: Install Dependencies
        run: npm install            # npm ci ki jagah

      # Step 4 - Playwright browsers install
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      # Step 5 - Storage state save ← MISSING THA TERE MEIN
      - name: Save Storage State
        run: node tests/storageState.js

      # Step 6 - Tests run karo
      - name: Run Playwright Tests
        run: npx playwright test tests/login.spec.js
        env:
          CI: true                  # headless mode ensure karta hai

      # Step 7 - Report upload
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Step 8 - GitHub Pages ke liye report upload karo
      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: ${{ !cancelled() }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ !cancelled() }}
        with:
          path: playwright-report/

  # ─────────────────────────────
  # JOB 2 — GitHub Pages Deploy
  # ─────────────────────────────
  deploy:
    name: Deploy Report to GitHub Pages
    needs: test          # test job complete hone ke baad chalega
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4    